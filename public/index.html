<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>页面内容抓取工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s ease;
      font-family: monospace;
    }

    .form-input:focus {
      outline: none;
      border-color: #11998e;
      box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
    }

    .form-input::placeholder {
      color: #999;
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(17, 153, 142, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result-area {
      display: none;
    }

    .result-area.show {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .result-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .result-text {
      max-height: 300px;
      overflow-y: auto;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .result-text::-webkit-scrollbar {
      width: 6px;
    }

    .result-text::-webkit-scrollbar-track {
      background: #eee;
      border-radius: 3px;
    }

    .result-text::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    .download-btn {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #11998e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .download-btn:hover {
      background: #0d7a70;
      transform: translateY(-2px);
    }

    .download-btn svg {
      width: 20px;
      height: 20px;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.9);
    }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      line-height: 1.5;
    }

    .url-preview {
      margin-top: 12px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 13px;
      color: #065f46;
      font-family: monospace;
      word-break: break-all;
    }

    .url-preview-title {
      font-weight: 500;
      margin-bottom: 4px;
      color: #047857;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 页面内容抓取工具</h1>
      <p>输入URL，自动抓取页面内容并生成文档</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="form-label">输入目标URL</label>
        <input type="text" id="urlInput" class="form-input" placeholder="例如: https://example.com/page?percent=50" />
        <div class="hint">
          系统会自动将URL中的 percent 参数改为 100，然后抓取页面中 class="short-story-share-content" 的内容
        </div>
        <div class="url-preview" id="urlPreview" style="display: none;">
          <div class="url-preview-title">修改后的URL:</div>
          <div id="modifiedUrl"></div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="startFetch()" id="fetchBtn">
        <span class="btn-text">开始抓取</span>
      </button>
    </div>

    <div class="card result-area" id="resultArea">
      <div class="result-header">
        <span class="result-title">抓取结果预览</span>
        <span style="font-size: 14px; color: #666;" id="charCount">-- 字</span>
      </div>
      <div class="result-text" id="resultText"></div>
      <button class="download-btn" onclick="downloadDoc()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        下载DOC文档
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const urlPreview = document.getElementById('urlPreview');
    const modifiedUrl = document.getElementById('modifiedUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const resultArea = document.getElementById('resultArea');
    const resultText = document.getElementById('resultText');
    const charCount = document.getElementById('charCount');
    const toast = document.getElementById('toast');

    let currentUrl = '';
    let currentContent = '';
    let currentFileName = 'content.docx';

    urlInput.addEventListener('input', () => {
      const url = urlInput.value.trim();
      if (url) {
        const modified = modifyUrlPercent(url);
        modifiedUrl.textContent = modified;
        urlPreview.style.display = 'block';
      } else {
        urlPreview.style.display = 'none';
      }
    });

    function modifyUrlPercent(url) {
      try {
        const urlObj = new URL(url);
        urlObj.searchParams.set('percent', '100');
        return urlObj.toString();
      } catch {
        if (url.includes('?')) {
          if (url.includes('percent=')) {
            return url.replace(/percent=\d+/, 'percent=100');
          }
          return url + '&percent=100';
        }
        return url + '?percent=100';
      }
    }

    async function startFetch() {
      const url = urlInput.value.trim();
      
      if (!url) {
        showToast('请输入URL', 'error');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showToast('请输入有效的URL（以http://或https://开头）', 'error');
        return;
      }

      currentUrl = url;
      fetchBtn.disabled = true;
      fetchBtn.innerHTML = '<div class="loading"><div class="spinner"></div><span>抓取中...</span></div>';
      resultArea.classList.remove('show');

      try {
        const response = await fetch('/api/generate-doc', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ url })
        });

        if (!response.ok) {
          let errorMessage = '抓取失败';
          try {
            const errorData = await response.json();
            errorMessage = errorData.error || errorMessage;
          } catch (e) {
            console.error('解析错误响应失败:', e);
          }
          showToast(errorMessage, 'error');
          return;
        }

        const contentDisposition = response.headers.get('Content-Disposition');
        if (contentDisposition) {
          const match = contentDisposition.match(/filename\*=UTF-8''(.+)/);
          if (match) {
            currentFileName = decodeURIComponent(match[1]);
          }
        }

        const blob = await response.blob();
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const arrayBuffer = e.target.result;
            const textDecoder = new TextDecoder('utf-8');
            let content = textDecoder.decode(arrayBuffer);
            
            const startIndex = content.indexOf('<w:t>');
            const endIndex = content.lastIndexOf('</w:t>');
            
            if (startIndex !== -1 && endIndex !== -1) {
              content = content.substring(startIndex + 5, endIndex);
              content = content.replace(/<\/w:t><w:t>/g, '');
              content = content.replace(/<[^>]*>/g, '');
            } else {
              const textContent = content.replace(/<[^>]*>/g, '');
              const cleanContent = textContent.replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s，。！？；：、""''（）《》\n]/g, '');
              content = cleanContent.substring(0, 5000);
            }
            
            currentContent = content;
            resultText.textContent = content;
            charCount.textContent = `${content.length} 字`;
            resultArea.classList.add('show');
            showToast('抓取成功');
          } catch (parseError) {
            console.error('解析文档失败:', parseError);
            currentContent = '文档内容无法解析，但文件已准备好下载';
            resultText.textContent = currentContent;
            charCount.textContent = '未知';
            resultArea.classList.add('show');
            showToast('抓取成功，请下载查看');
          }
        };
        reader.readAsArrayBuffer(blob);
      } catch (error) {
        console.error('抓取请求失败:', error);
        showToast('网络错误，请重试', 'error');
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.innerHTML = '<span class="btn-text">开始抓取</span>';
      }
    }

    async function downloadDoc() {
      if (!currentUrl) {
        showToast('请先抓取内容', 'error');
        return;
      }

      try {
        const response = await fetch('/api/generate-doc', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ url: currentUrl })
        });

        if (response.ok) {
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = currentFileName;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
          showToast('文档下载成功');
        } else {
          const errorData = await response.json();
          showToast(errorData.error || '下载失败', 'error');
        }
      } catch (error) {
        console.error('下载请求失败:', error);
        showToast('网络错误，请重试', 'error');
      }
    }

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
  </script>
</body>
</html>
